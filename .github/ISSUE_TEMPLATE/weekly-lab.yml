name: Weekly Lab
description: Plan, execute, and document a weekly lab
labels: ["lab"]
body:
  - type: input
    id: week
    attributes:
      label: Week #
      placeholder: "e.g., 1"
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What problem are you solving?
  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: High-level steps you plan to take
  - type: textarea
    id: deliverables
    attributes:
      label: Deliverables
      description: What artifacts will you produce?
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Screenshots, logs, configs (link or describe)
  - type: dropdown
    id: time_spent
    attributes:
      label: Time Spent
      options:
        - "< 5h"
        - "5–10h"
        - "10–15h"
        - "> 15h"
